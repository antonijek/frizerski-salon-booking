version: "3.8"

services:
    # ============================================
    # MySQL baza podataka
    # ============================================
    db:
        image: mysql:8.0
        container_name: frizerski-db
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
            MYSQL_DATABASE: ${DB_NAME:-frizerski_salon}
            MYSQL_USER: ${DB_USER:-frizerski_user}
            MYSQL_PASSWORD: ${DB_PASSWORD:-userpassword}
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

    # ============================================
    # Backend (Express.js API)
    # ============================================
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: frizerski-backend
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        environment:
            DB_HOST: db
            DB_USER: ${DB_USER:-frizerski_user}
            DB_PASSWORD: ${DB_PASSWORD:-userpassword}
            DB_NAME: ${DB_NAME:-frizerski_salon}
            PORT: 5000
            JWT_SECRET: ${JWT_SECRET:-your-default-jwt-secret-change-in-production}
        ports:
            - "5000:5000"
        volumes:
            - backend_uploads:/app/uploads

    # ============================================
    # Frontend (React + Nginx)
    # ============================================
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: frizerski-frontend
        restart: unless-stopped
        depends_on:
            - backend
        ports:
            - "80:80"
        volumes:
            - frontend_dist:/usr/share/nginx/html

volumes:
    mysql_data:
    backend_uploads:
    frontend_dist:
